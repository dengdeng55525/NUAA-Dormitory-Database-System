<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>宿舍管理后台</title>
    <style>
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f7f7f9; margin: 0; }
        #current-admin-bar-top {
            width:100%;
            background:#fff;
            text-align:center;
            color:#3865d1;
            font-size:16px;
            font-weight:bold;
            font-family:'Microsoft YaHei',Arial,sans-serif;
            padding:13px 0 9px 0;
            box-shadow:0 2px 8px #eee;
        }
        .header { background: #3865d1; color: #fff; padding: 16px 30px; font-size: 22px; position:relative; }
        .tabs { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 30px; display: flex; }
        .tabs button { border: none; background: none; font-size: 16px; margin-right: 28px; padding: 16px 0; color: #666; cursor: pointer; }
        .tabs button:last-child { margin-right: 0; }
        .tabs .active { color: #3865d1; font-weight: bold; border-bottom: 2px solid #3865d1;}
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: #fff; margin-bottom: 18px;}
        th, td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            text-align: center;
        }
        th { background: #f1f4fa; color: #333; }
        tr:last-child td { border-bottom: none; }
        .pagination { margin: 12px 0; }
        .pagination button, .pagination span { margin: 0 2px; }
        .top-bar {
            margin: 28px 0 0 0;
            text-align: right;
        }
        #global-search-input { padding: 6px; width: 220px; border: 1px solid #d3d3d3; border-radius: 3px;}
        #global-search-btn { padding: 6px 16px; border: none; background: #3865d1; color: #fff; border-radius: 3px; cursor: pointer;}
        #global-search-modal { display:none; position:fixed; top:70px; right:60px; width:570px; max-height:80vh; overflow:auto; background:#fff; border:1px solid #ccc; padding:18px 20px 10px 20px; box-shadow: 0 2px 12px #aaa; z-index:1000;}
        #global-search-modal h4 { margin: 14px 0 6px 0; }
        #global-search-modal table { font-size: 13px; margin-bottom:8px;}
        #global-search-modal th, #global-search-modal td { padding: 4px 7px; }
        #global-search-modal th { background: #f8f8f8; }
        #global-search-modal .close-btn { background:none; border:none; font-size:15px; color:#888; float:right; cursor:pointer; margin-top:-8px;}
        #modal-bg { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.15); z-index:1100;}
        #modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; min-width:350px; padding:35px 35px 25px 35px; border-radius:8px; box-shadow:0 4px 20px #aaa; z-index:1200;}
        #modal-title { font-size:18px; margin-bottom:16px;}
        #pw-modal-bg { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.23); z-index:1500;}
        #pw-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; min-width:320px; padding:35px 35px 25px 35px; border-radius:8px; box-shadow:0 4px 20px #333; z-index:1600;}
        #pw-modal-title { font-size:18px; margin-bottom:20px;}
        #pw-modal label { display:block; margin:8px 0 2px 0;}
        #pw-modal input { width:98%; padding:8px 6px; margin-bottom:12px; border:1px solid #d3d3d3; border-radius:4px;}
        #pw-modal .msg { color:#e74c3c; height:20px; margin-bottom:10px;}
        #pw-modal .pw-ok { color:#27ae60; }
        #close-pw-modal {
            position:absolute;
            right:13px;
            top:10px;
            font-size:22px;
            background:transparent;
            border:none;
            cursor:pointer;
            color:#888;
        }
        /* 学生密码重置弹窗样式 */
        #pw-modal-bg-stu { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.23); z-index:1500;}
        #pw-modal-stu { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; min-width:320px; padding:35px 35px 25px 35px; border-radius:8px; box-shadow:0 4px 20px #333; z-index:1600;}
        #pw-modal-title-stu { font-size:18px; margin-bottom:20px;}
        #pw-modal-stu label { display:block; margin:8px 0 2px 0;}
        #pw-modal-stu input { width:98%; padding:8px 6px; margin-bottom:12px; border:1px solid #d3d3d3; border-radius:4px;}
        #pw-modal-stu .msg { color:#e74c3c; height:20px; margin-bottom:10px;}
        #pw-modal-stu .pw-ok { color:#27ae60; }
        #close-pw-modal-stu {
            position:absolute;
            right:13px;
            top:10px;
            font-size:22px;
            background:transparent;
            border:none;
            cursor:pointer;
            color:#888;
        }
        /* 统计图表部分 */
        #stats-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            justify-content: center;
        }
        #stats-nav button {
            padding: 7px 16px;
            background: #f1f4fa;
            border: 1px solid #d3d3d3;
            border-radius: 5px;
            color: #3865d1;
            font-size: 15px;
            cursor: pointer;
        }
        #stats-nav .active {
            background: #3865d1;
            color: #fff;
            border-color: #3865d1;
        }
        #chart-occupancy, #chart-award, #chart-visitor {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px #eee;
            padding: 18px 10px 0 10px;
            margin-bottom: 20px;
            width: 100%;
            height: 420px;
            min-height: 320px;
        }
        @media (max-width: 800px) {
            .container { padding:10px; }
            #global-search-modal { width:98vw; right:1vw; left:1vw; }
            #current-admin-bar-top { font-size:14px; }
            .top-bar { margin-top: 22px; }
            #chart-occupancy, #chart-award, #chart-visitor {
                min-width: 0;
                padding: 6px 2px 0 2px;
                height: 320px;
            }
            .tabs { flex-direction: column; align-items: stretch; }
        }
        /* 毕业处理弹窗样式 */
        #graduate-modal-bg { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.15); z-index:2200;}
        #graduate-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:25px 38px 18px 38px; border-radius:8px; box-shadow:0 4px 20px #aaa; z-index:2300; }
    </style>
</head>
<body>
    <!-- 顶部居中显示 -->
    <div id="current-admin-bar-top"></div>
    <div class="header">
        宿舍管理后台
        <button id="logout-btn" style="position:absolute;top:18px;right:36px;padding:7px 20px;font-size:14px;background:#fff;color:#3865d1;border:1px solid #3865d1;border-radius:5px;cursor:pointer;">退出登录</button>
        <button id="change-pw-btn" style="position:absolute;top:18px;right:170px;padding:7px 20px;font-size:14px;background:#fff;color:#3865d1;border:1px solid #3865d1;border-radius:5px;cursor:pointer;">修改密码</button>
        <button id="reset-stu-pw-btn" style="position:absolute;top:18px;right:300px;padding:7px 20px;font-size:14px;background:#fff;color:#3865d1;border:1px solid #3865d1;border-radius:5px;cursor:pointer;">学生密码重置</button>
    </div>
    <div class="tabs">
        <button id="tab-student" class="active">学生信息</button>
        <button id="tab-award">宿舍奖惩</button>
        <button id="tab-check">宿舍检查</button>
        <button id="tab-visitor">访客记录</button>
        <button id="tab-stats">统计分析</button>
        <button id="tab-bed">宿舍床位信息一览</button>
    </div>
    <div class="top-bar">
        <input id="global-search-input" placeholder="搜索学号/姓名/宿舍/奖惩/访客..." autocomplete="off">
        <button id="global-search-btn">查询</button>
    </div>

    <div class="container">
        <!-- 学生 -->
        <div class="section active" id="section-student">
            <div style="margin-bottom:10px;">
                <button id="add-student-btn">新增学生</button>
                <button id="filter-ungraduated-btn" style="margin-left:14px;">只看未毕业学生</button>
                <button id="graduate-btn" style="margin-left:14px;">毕业处理</button>
                 <button id="export-student-csv-btn" style="margin-left:14px;">导出CSV</button>
            </div>
            <!-- 毕业处理弹窗 -->
            <div id="graduate-modal-bg"></div>
            <div id="graduate-modal">
                <div style="font-size:18px;margin-bottom:16px;">毕业处理</div>
                <form id="graduate-form">
                    <label for="graduate-year">毕业到哪一届（年级）之前：</label>
                    <input type="number" id="graduate-year" min="1" step="1" style="width:80px;margin:0 8px;">
                    <span style="color:#888;">（输入如2023，表示2023及之前的年级全部毕业）</span>
                    <div id="graduate-msg" style="color:#e74c3c;height:20px;margin:10px 0;"></div>
                    <button type="submit" style="margin-top:8px;width:100%;background:#3865d1;color:#fff;font-size:15px;padding:8px 0;border:none;border-radius:5px;cursor:pointer;">批量毕业</button>
                    <button type="button" id="graduate-cancel-btn" style="margin-top:8px;width:100%;background:#eee;color:#333;font-size:15px;padding:8px 0;border:none;border-radius:5px;cursor:pointer;">取消</button>
                </form>
            </div>
            <!-- 新增筛选栏 -->
            <div id="student-filter-bar" style="margin-bottom:14px;">
                学号：<input id="filter-student-no" style="width:90px">
                姓名：<input id="filter-name" style="width:90px">
                性别：
                <select id="filter-gender">
                    <option value="">全部</option>
                    <option value="M">男</option>
                    <option value="F">女</option>
                </select>
                年级：<input id="filter-grade" style="width:60px">
                电话：<input id="filter-phone" style="width:90px">
                宿舍楼：<input id="filter-dorm-building" style="width:60px">
                房号：<input id="filter-dorm-room" style="width:60px">
                床号：<input id="filter-bed-number" style="width:40px">
                <button id="filter-student-btn" style="margin-left:8px;">筛选</button>
                <button id="reset-student-filter-btn" style="margin-left:2px;">重置</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>学号</th><th>姓名</th><th>性别</th><th>年级</th><th>电话</th><th>宿舍</th><th>床号</th><th>备注</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="student-tbody"></tbody>
            </table>
            <div class="pagination" id="student-pagination"></div>
        </div>
        <!-- 奖惩 -->
        <div class="section" id="section-award">
            <div style="margin-bottom:10px;">
                <button id="add-award-btn">新增奖惩</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>宿舍</th><th>奖惩类型</th><th>学期</th><th>理由</th><th>获奖惩时间</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="award-tbody"></tbody>
            </table>
            <div class="pagination" id="award-pagination"></div>
        </div>
        <!-- 检查 -->
        <div class="section" id="section-check">
            <div style="margin-bottom:10px;">
                <button id="add-check-btn">新增检查</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>宿舍</th><th>日期</th><th>检查人</th><th>分数</th><th>备注</th><th>整改</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="check-tbody"></tbody>
            </table>
            <div class="pagination" id="check-pagination"></div>
        </div>
        <!-- 访客 -->
        <div class="section" id="section-visitor">
            <table>
                <thead>
                    <tr>
                        <th>姓名</th><th>宿舍</th><th>被访学生</th><th>来访</th><th>离开</th><th>事由</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="visitor-tbody"></tbody>
            </table>
            <div class="pagination" id="visitor-pagination"></div>
        </div>
<!-- 统计分析 -->
<div class="section" id="section-stats">
    <!-- 顶部统计卡片 -->
    <div style="display:flex;gap:24px;margin-bottom:18px;">
        <div id="stats-student-count" style="background:#fff;border-radius:8px;box-shadow:0 2px 8px #edecec;padding:16px 26px;min-width:170px;">
            <div style="font-size:15px;color:#888;margin-bottom:6px;">学生总数</div>
            <div id="student-count-value" style="font-size:26px;color:#3865d1;font-weight:bold;">--</div>
        </div>
        <div id="stats-grade-count" style="background:#fff;border-radius:8px;box-shadow:0 2px 8px #edecec;padding:16px 26px;min-width:260px;">
            <div style="font-size:15px;color:#888;margin-bottom:6px;">各年级人数</div>
            <div id="grade-count-values" style="font-size:15px;color:#3865d1;display:flex;gap:16px;flex-wrap:wrap;">--</div>
        </div>
    </div>
    <!-- 统计分析tab -->
    <div id="stats-nav" style="display:flex;gap:12px;margin-bottom:16px;">
        <button id="btn-stats-occupancy" class="active">宿舍楼入住率</button>
        <button id="btn-stats-award">奖惩比例</button>
        <button id="btn-stats-visitor">访客类型占比</button>
        <button id="btn-stats-dorm-award">各宿舍奖惩统计</button>
    </div>
    <!-- 图表/奖项统计区域 -->
    <div id="chart-occupancy" style="display:block;"></div>
    <div id="chart-award" style="display:none;"></div>
    <div id="chart-visitor" style="display:none;"></div>
    <!-- 修改后的奖项统计tab内容 -->
    <div id="dorm-award-table-section" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div id="award-stats-summary" style="font-size: 14px; color: #666;">
                统计加载中...
            </div>
            <button id="export-awards-btn" style="background: #3865d1; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size:14px;">
                导出CSV
            </button>
        </div>

        <!-- 筛选栏 -->
        <div id="award-filter-bar" style="display: flex; gap: 12px; margin-bottom: 20px; align-items: center;">
            <div style="display:flex; align-items:center;">
                <label for="award-filter-building" style="font-size:14px; color:#666; margin-right:6px;">宿舍楼:</label>
                <input type="text" id="award-filter-building" style="width: 80px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px;" placeholder="楼栋">
            </div>
            <div style="display:flex; align-items:center;">
                <label for="award-filter-room" style="font-size:14px; color:#666; margin-right:6px;">房间号:</label>
                <input type="text" id="award-filter-room" style="width: 80px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px;" placeholder="房号">
            </div>
            <button id="award-filter-btn" style="background: #3865d1; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer;">
                筛选
            </button>
            <button id="award-filter-reset-btn" style="background: #f1f4fa; color: #666; border: 1px solid #ddd; border-radius: 4px; padding: 6px 12px; cursor: pointer;">
                重置
            </button>
        </div>

        <!-- 数据表格 -->
        <div style="background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #f8fafd;">
                        <th style="padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee;">宿舍楼</th>
                        <th style="padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee;">房间号</th>
                        <th style="padding: 12px 15px; text-align: right; border-bottom: 1px solid #eee;">获奖惩次数</th>
                    </tr>
                </thead>
                <tbody id="award-table-body">
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 24px; color: #888;">
                            <div>加载中...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
        <!-- 床位信息 -->
        <div class="section" id="section-bed">
            <div style="margin-bottom:10px;">床位信息一览</div>
            <!-- 床位筛选栏 -->
            <div id="bed-filter-bar" style="margin-bottom:14px;">
                楼栋：<input id="filter-bed-building" style="width:60px">
                房号：<input id="filter-bed-room" style="width:60px">
                床号：<input id="filter-bed-number" style="width:40px">
                状态：
                <select id="filter-bed-status">
                    <option value="">全部</option>
                    <option value="未入住">未入住</option>
                    <option value="已入住">已入住</option>
                </select>
                学号：<input id="filter-bed-student-no" style="width:90px">
                姓名：<input id="filter-bed-student-name" style="width:90px">
                <button id="filter-bed-btn" style="margin-left:8px;">筛选</button>
                <button id="reset-bed-filter-btn" style="margin-left:2px;">重置</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>楼栋</th><th>房号</th><th>床号</th><th>状态</th><th>学号</th><th>姓名</th>
                    </tr>
                </thead>
                <tbody id="bed-tbody"></tbody>
            </table>
            <div class="pagination" id="bed-pagination"></div>
        </div>
    </div>
    <!-- 搜索弹窗 -->
    <div id="global-search-modal">
        <button class="close-btn" onclick="closeGlobalSearchModal()">✕</button>
        <div id="global-search-result"></div>
    </div>
    <!-- 弹窗 -->
    <div id="modal-bg"></div>
    <div id="modal">
        <div id="modal-title" style="font-size:18px;"></div>
        <form id="modal-form"></form>
    </div>
    <!-- 管理员修改自己密码弹窗 -->
    <div id="pw-modal-bg"></div>
    <div id="pw-modal">
        <button id="close-pw-modal" title="关闭">×</button>
        <div id="pw-modal-title">修改我的密码</div>
        <form id="pw-modal-form">
            <label for="old-pw">原密码</label>
            <input type="password" id="old-pw" autocomplete="current-password">
            <label for="new-pw">新密码</label>
            <input type="password" id="new-pw" autocomplete="new-password">
            <label for="new-pw2">确认新密码</label>
            <input type="password" id="new-pw2" autocomplete="new-password">
            <div class="msg" id="pw-msg"></div>
            <button type="submit" style="width:100%;background:#3865d1;color:#fff;font-size:16px;padding:8px 0;border:none;border-radius:5px;cursor:pointer;">提交修改</button>
        </form>
    </div>
    <!-- 学生密码重置弹窗 -->
    <div id="pw-modal-bg-stu"></div>
    <div id="pw-modal-stu">
        <button id="close-pw-modal-stu" title="关闭">×</button>
        <div id="pw-modal-title-stu">重置学生密码</div>
        <form id="pw-modal-form-stu">
            <label for="stu-no">学号</label>
            <input type="text" id="stu-no" autocomplete="off" placeholder="可留空，用姓名模糊查找">
            <label for="stu-name">姓名</label>
            <input type="text" id="stu-name" autocomplete="off" placeholder="可留空，用学号精确查找">
            <label for="stu-new-pw">新密码</label>
            <input type="password" id="stu-new-pw" autocomplete="new-password" placeholder="必填">
            <div class="msg" id="pw-stu-msg"></div>
            <button type="submit" style="width:100%;background:#3865d1;color:#fff;font-size:16px;padding:8px 0;border:none;border-radius:5px;cursor:pointer;">提交修改</button>
        </form>
    </div>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <script src="admin_manager.js"></script>
    <script>
    // 页面加载后再绑定所有事件，保证所有控件都已存在
    document.addEventListener('DOMContentLoaded', function() {
        // 密码弹窗绑定
        document.getElementById('change-pw-btn').onclick = function() {
            document.getElementById('pw-modal-bg').style.display = 'block';
            document.getElementById('pw-modal').style.display = 'block';
            document.getElementById('old-pw').value = '';
            document.getElementById('new-pw').value = '';
            document.getElementById('new-pw2').value = '';
            document.getElementById('pw-msg').textContent = '';
        };
        document.getElementById('pw-modal-bg').onclick = function() {
            document.getElementById('pw-modal-bg').style.display = 'none';
            document.getElementById('pw-modal').style.display = 'none';
        };
        document.getElementById('close-pw-modal').onclick = function() {
            document.getElementById('pw-modal-bg').style.display = 'none';
            document.getElementById('pw-modal').style.display = 'none';
        };
        document.getElementById('reset-stu-pw-btn').onclick = function() {
            document.getElementById('pw-modal-bg-stu').style.display = 'block';
            document.getElementById('pw-modal-stu').style.display = 'block';
            document.getElementById('stu-no').value = '';
            document.getElementById('stu-name').value = '';
            document.getElementById('stu-new-pw').value = '';
            document.getElementById('pw-stu-msg').textContent = '';
        };
        document.getElementById('pw-modal-bg-stu').onclick = function() {
            document.getElementById('pw-modal-bg-stu').style.display = 'none';
            document.getElementById('pw-modal-stu').style.display = 'none';
        };
        document.getElementById('close-pw-modal-stu').onclick = function() {
            document.getElementById('pw-modal-bg-stu').style.display = 'none';
            document.getElementById('pw-modal-stu').style.display = 'none';
        };

        // 毕业处理弹窗逻辑
        document.getElementById('graduate-btn').onclick = function() {
            document.getElementById('graduate-year').value = '';
            document.getElementById('graduate-msg').textContent = '';
            document.getElementById('graduate-modal-bg').style.display = 'block';
            document.getElementById('graduate-modal').style.display = 'block';
        };
        document.getElementById('graduate-modal-bg').onclick =
        document.getElementById('graduate-cancel-btn').onclick = function() {
            document.getElementById('graduate-modal-bg').style.display = 'none';
            document.getElementById('graduate-modal').style.display = 'none';
        };
        document.getElementById('graduate-form').onsubmit = function(e) {
            e.preventDefault();
            var year = document.getElementById('graduate-year').value.trim();
            var msg = document.getElementById('graduate-msg');
            if (!year) {
                msg.style.color = "#e74c3c";
                msg.textContent = "请输入年级";
                return;
            }
            msg.style.color = "#888";
            msg.textContent = "正在处理...";
            fetch(`/api/admin/students/graduate/${year}`, { method: 'POST' })
                .then(r=>r.json())
                .then(res=>{
                    if (res.success) {
                        msg.style.color = "#27ae60";
                        msg.textContent = res.message || "毕业处理成功";
                        setTimeout(function() {
                            document.getElementById('graduate-modal-bg').style.display = 'none';
                            document.getElementById('graduate-modal').style.display = 'none';
                            msg.style.color = "#e74c3c";
                            if (typeof loadStudents === "function") loadStudents(1);
                        }, 1000);
                    } else {
                        msg.style.color = "#e74c3c";
                        msg.textContent = res.message || "毕业处理失败";
                    }
                }).catch(()=>{ msg.textContent = "请求出错"; });
        };
    });
    </script>
</body>
</html>
